# =============================================================================
# ARA — Deployment pipeline (Azure DevOps)
# Provisions infra (Bicep, subscription scope) + deploys API + Web app services.
#
# Setup (one-time per project):
#   1. Create ADO Service Connection of type "Azure Resource Manager" and
#      name it `ara-azure` (or override via variable-group value below).
#   2. Create Variable Group `ara-deploy` (Library) with:
#        azureSubscription      = ara-azure           (name of the ARM SC above)
#        project                = ra
#        azureRegion            = southindia
#        deployerObjectId       = <SP object id used by Bicep RBAC assignments>
#        publisherAcrLoginServer= ''  (optional; leave empty for zip deploys)
#        imageTag               = ''  (optional; leave empty for zip deploys)
#   3. Create ADO Environment `ara-dev` (and other envs) for approval gates.
# =============================================================================
name: ARA-Deploy-$(Date:yyyyMMdd)$(Rev:.rr)

trigger:
  branches:
    include: [ main ]
  paths:
    include:
      - api/**
      - src/**
      - deploy/**
      - package.json
      - package-lock.json
      - deploy/pipelines/deploy.ado.yml

parameters:
  - name: targetEnv
    displayName: 'Target environment'
    type: string
    default: 'dev'
    values: [ dev, test, uat, prod ]

variables:
  - group: ara-deploy
  - name: bicepDir
    value: '$(Build.SourcesDirectory)/deploy/bicep'
  - name: apiPublishDir
    value: '$(Build.ArtifactStagingDirectory)/api'
  - name: webPublishDir
    value: '$(Build.ArtifactStagingDirectory)/web'
  - name: paramFile
    value: '$(Build.SourcesDirectory)/deploy/bicep/parameters.${{ parameters.targetEnv }}.json'
  - name: deploymentName
    value: 'ara-${{ parameters.targetEnv }}-$(Build.BuildId)'

stages:
# ---------------------------------------------------------------------------
# 1. Build API (dotnet publish) + Web (npm build) in parallel.
# ---------------------------------------------------------------------------
- stage: Build
  jobs:
    - job: BuildApi
      displayName: 'Build & publish API'
      pool: { vmImage: 'ubuntu-latest' }
      steps:
        - task: UseDotNet@2
          inputs: { packageType: 'sdk', version: '8.0.x' }
        - script: |
            dotnet publish api/src/AI.Regulatory.API/AI.Regulatory.API.csproj \
              -c Release -o "$(apiPublishDir)"
          displayName: 'dotnet publish'
        - task: ArchiveFiles@2
          inputs:
            rootFolderOrFile: '$(apiPublishDir)'
            includeRootFolder: false
            archiveType: 'zip'
            archiveFile: '$(Build.ArtifactStagingDirectory)/api.zip'
        - publish: '$(Build.ArtifactStagingDirectory)/api.zip'
          artifact: api-package

    - job: BuildWeb
      displayName: 'Build SPA'
      pool: { vmImage: 'ubuntu-latest' }
      steps:
        - task: NodeTool@0
          inputs: { versionSpec: '20.x' }
        - script: |
            set -e
            npm ci
            CFG="deploy/config/spa.${{ parameters.targetEnv }}.env"
            if [ -f "$CFG" ]; then
              echo "Sourcing $CFG"
              set -a; . "$CFG"; set +a
            else
              echo "WARNING: $CFG not found — building with no VITE_* overrides."
            fi
            npm run build
            mkdir -p "$(webPublishDir)"
            cp -r dist/* "$(webPublishDir)/"
          displayName: 'npm ci + npm run build (per-env VITE_* config)'
        - task: ArchiveFiles@2
          inputs:
            rootFolderOrFile: '$(webPublishDir)'
            includeRootFolder: false
            archiveType: 'zip'
            archiveFile: '$(Build.ArtifactStagingDirectory)/web.zip'
        - publish: '$(Build.ArtifactStagingDirectory)/web.zip'
          artifact: web-package

# ---------------------------------------------------------------------------
# 2. Bicep what-if preview
# ---------------------------------------------------------------------------
- stage: WhatIf
  dependsOn: Build
  jobs:
    - job: WhatIfPreview
      pool: { vmImage: 'ubuntu-latest' }
      steps:
        - checkout: self
        - task: AzureCLI@2
          displayName: 'az deployment sub what-if'
          inputs:
            azureSubscription: $(azureSubscription)
            scriptType: bash
            scriptLocation: inlineScript
            inlineScript: |
              set -e
              az deployment sub what-if \
                --location $(azureRegion) \
                --template-file $(bicepDir)/main.bicep \
                --parameters $(paramFile) \
                --parameters environmentName=${{ parameters.targetEnv }} \
                             project=$(project) \
                             location=$(azureRegion) \
                             publisherAcrLoginServer=$(publisherAcrLoginServer) \
                             imageTag=$(imageTag) \
                             deployerObjectId=$(deployerObjectId)

# ---------------------------------------------------------------------------
# 3. Deploy infra + both app services
# ---------------------------------------------------------------------------
- stage: Deploy
  dependsOn: WhatIf
  jobs:
    - deployment: DeployInfra
      environment: 'ara-${{ parameters.targetEnv }}'   # ADO Environment provides approval gate
      pool: { vmImage: 'ubuntu-latest' }
      strategy:
        runOnce:
          deploy:
            steps:
              - checkout: self
              - download: current
                artifact: api-package
              - download: current
                artifact: web-package

              - task: AzureCLI@2
                name: bicep
                displayName: 'Bicep deploy (subscription scope)'
                inputs:
                  azureSubscription: $(azureSubscription)
                  scriptType: bash
                  scriptLocation: inlineScript
                  inlineScript: |
                    set -e
                    az deployment sub create \
                      --location $(azureRegion) \
                      --name "$(deploymentName)" \
                      --template-file $(bicepDir)/main.bicep \
                      --parameters $(paramFile) \
                      --parameters environmentName=${{ parameters.targetEnv }} \
                                   project=$(project) \
                                   location=$(azureRegion) \
                                   publisherAcrLoginServer=$(publisherAcrLoginServer) \
                                   imageTag=$(imageTag) \
                                   deployerObjectId=$(deployerObjectId)
                    RG=$(az deployment sub show --name "$(deploymentName)" --query "properties.outputs.resourceGroupName.value" -o tsv)
                    NP=$(az deployment sub show --name "$(deploymentName)" --query "properties.outputs.namePrefix.value" -o tsv)
                    echo "##vso[task.setvariable variable=rgName;isOutput=true]$RG"
                    echo "##vso[task.setvariable variable=apiAppName;isOutput=true]app-$NP-api"
                    echo "##vso[task.setvariable variable=webAppName;isOutput=true]app-$NP-web"

              - task: AzureCLI@2
                displayName: 'Apply API app-settings (deploy/config/appsettings.api.${{ parameters.targetEnv }}.json)'
                inputs:
                  azureSubscription: $(azureSubscription)
                  scriptType: pscore
                  scriptLocation: inlineScript
                  inlineScript: |
                    & "$(Build.SourcesDirectory)/deploy/scripts/apply-appsettings.ps1" `
                      -ResourceGroup "$(bicep.rgName)" `
                      -AppName       "$(bicep.apiAppName)" `
                      -EnvName       "${{ parameters.targetEnv }}" `
                      -App           "api"

              - task: AzureCLI@2
                displayName: 'Apply Web app-settings (if present)'
                condition: succeeded()
                continueOnError: true
                inputs:
                  azureSubscription: $(azureSubscription)
                  scriptType: pscore
                  scriptLocation: inlineScript
                  inlineScript: |
                    $cfg = "$(Build.SourcesDirectory)/deploy/config/appsettings.web.${{ parameters.targetEnv }}.json"
                    if (Test-Path $cfg) {
                      & "$(Build.SourcesDirectory)/deploy/scripts/apply-appsettings.ps1" `
                        -ResourceGroup "$(bicep.rgName)" `
                        -AppName       "$(bicep.webAppName)" `
                        -EnvName       "${{ parameters.targetEnv }}" `
                        -App           "web"
                    } else {
                      Write-Host "No web app-settings file — skipping."
                    }

              # ---- API zip deploy: prod slot for dev (B1 has no slots), staging slot otherwise
              - task: AzureWebApp@1
                displayName: 'Deploy API zip (production slot — dev)'
                condition: and(succeeded(), eq('${{ parameters.targetEnv }}', 'dev'))
                inputs:
                  azureSubscription: $(azureSubscription)
                  appType: 'webAppLinux'
                  appName: '$(bicep.apiAppName)'
                  resourceGroupName: '$(bicep.rgName)'
                  package: '$(Pipeline.Workspace)/api-package/api.zip'
                  deploymentMethod: 'zipDeploy'

              - task: AzureWebApp@1
                displayName: 'Deploy API zip (staging slot — non-dev)'
                condition: and(succeeded(), ne('${{ parameters.targetEnv }}', 'dev'))
                inputs:
                  azureSubscription: $(azureSubscription)
                  appType: 'webAppLinux'
                  appName: '$(bicep.apiAppName)'
                  resourceGroupName: '$(bicep.rgName)'
                  package: '$(Pipeline.Workspace)/api-package/api.zip'
                  deploymentMethod: 'zipDeploy'
                  deployToSlotOrASE: true
                  slotName: 'staging'

              - task: AzureWebApp@1
                displayName: 'Deploy Web zip -> $(bicep.webAppName)'
                inputs:
                  azureSubscription: $(azureSubscription)
                  appType: 'webAppLinux'
                  appName: '$(bicep.webAppName)'
                  resourceGroupName: '$(bicep.rgName)'
                  package: '$(Pipeline.Workspace)/web-package/web.zip'
                  deploymentMethod: 'zipDeploy'

              - task: AzureCLI@2
                displayName: 'Smoke test API'
                inputs:
                  azureSubscription: $(azureSubscription)
                  scriptType: bash
                  scriptLocation: inlineScript
                  inlineScript: |
                    set -e
                    if [ "${{ parameters.targetEnv }}" = "dev" ]; then
                      HOST=$(az webapp show -g "$(bicep.rgName)" -n "$(bicep.apiAppName)" --query defaultHostName -o tsv)
                    else
                      HOST=$(az webapp show -g "$(bicep.rgName)" -n "$(bicep.apiAppName)" --slot staging --query defaultHostName -o tsv)
                    fi
                    for path in /health/live /health/ready; do
                      code=$(curl -sk -o /dev/null -w "%{http_code}" "https://$HOST$path")
                      if [ "$code" != "200" ]; then
                        echo "Smoke test failed: $path => $code"; exit 1
                      fi
                    done
                    echo "Smoke tests passed."

              - task: AzureCLI@2
                displayName: 'Blue/Green slot swap (non-dev)'
                condition: and(succeeded(), ne('${{ parameters.targetEnv }}', 'dev'))
                inputs:
                  azureSubscription: $(azureSubscription)
                  scriptType: bash
                  scriptLocation: inlineScript
                  inlineScript: |
                    az webapp deployment slot swap \
                      --resource-group "$(bicep.rgName)" \
                      --name "$(bicep.apiAppName)" \
                      --slot staging --target-slot production
