# =============================================================================
# ARA — Code pipeline (Azure DevOps)
# Builds API + SPA, applies app-settings, zip-deploys both app services,
# runs a smoke test, and (non-dev) swaps staging -> production.
#
# Does NOT run Bicep. Reads resource names from the latest sub-scope
# deployment (`ara-<env>-*`) — so the code pipeline is decoupled from
# infra pipeline runs.
#
# Trigger: any change under api/**, src/**, deploy/config/**, package*.json
# =============================================================================
name: ARA-Code-$(Date:yyyyMMdd)$(Rev:.rr)

trigger:
  branches:
    include: [ main ]
  paths:
    include:
      - api/**
      - src/**
      - deploy/config/**
      - deploy/scripts/**
      - package.json
      - package-lock.json
      - deploy/pipelines/deploy-code.ado.yml

parameters:
  - name: targetEnv
    displayName: 'Target environment'
    type: string
    default: 'dev'
    values: [ dev, test, uat, prod ]

variables:
  - group: ara-deploy
  - name: apiPublishDir
    value: '$(Build.ArtifactStagingDirectory)/api'
  - name: webPublishDir
    value: '$(Build.ArtifactStagingDirectory)/web'

stages:
# ---------------------------------------------------------------------------
# 1. Build API (dotnet publish) + Web (npm build) in parallel.
# ---------------------------------------------------------------------------
- stage: Build
  jobs:
    - job: BuildApi
      displayName: 'Build & publish API'
      pool: { vmImage: 'ubuntu-latest' }
      steps:
        - task: UseDotNet@2
          inputs: { packageType: 'sdk', version: '8.0.x' }
        - script: |
            dotnet publish api/src/AI.Regulatory.API/AI.Regulatory.API.csproj \
              -c Release -o "$(apiPublishDir)"
          displayName: 'dotnet publish'
        - task: ArchiveFiles@2
          inputs:
            rootFolderOrFile: '$(apiPublishDir)'
            includeRootFolder: false
            archiveType: 'zip'
            archiveFile: '$(Build.ArtifactStagingDirectory)/api.zip'
        - publish: '$(Build.ArtifactStagingDirectory)/api.zip'
          artifact: api-package

    - job: BuildWeb
      displayName: 'Build SPA'
      pool: { vmImage: 'ubuntu-latest' }
      steps:
        - task: NodeTool@0
          inputs: { versionSpec: '20.x' }
        - script: |
            set -e
            npm ci
            CFG="deploy/config/spa.${{ parameters.targetEnv }}.env"
            if [ -f "$CFG" ]; then
              echo "Sourcing $CFG"
              set -a; . "$CFG"; set +a
            else
              echo "WARNING: $CFG not found — building with no VITE_* overrides."
            fi
            npm run build
            mkdir -p "$(webPublishDir)"
            cp -r dist/* "$(webPublishDir)/"
          displayName: 'npm ci + npm run build (per-env VITE_* config)'
        - task: ArchiveFiles@2
          inputs:
            rootFolderOrFile: '$(webPublishDir)'
            includeRootFolder: false
            archiveType: 'zip'
            archiveFile: '$(Build.ArtifactStagingDirectory)/web.zip'
        - publish: '$(Build.ArtifactStagingDirectory)/web.zip'
          artifact: web-package

# ---------------------------------------------------------------------------
# 2. Deploy — reads names from the latest infra deployment, applies settings,
#    zip-deploys, smoke tests, and swaps slots (non-dev only).
# ---------------------------------------------------------------------------
- stage: Deploy
  dependsOn: Build
  jobs:
    - deployment: DeployCode
      environment: 'ara-${{ parameters.targetEnv }}'
      pool: { vmImage: 'ubuntu-latest' }
      strategy:
        runOnce:
          deploy:
            steps:
              - checkout: self
              - download: current
                artifact: api-package
              - download: current
                artifact: web-package

              - task: AzureCLI@2
                name: lookup
                displayName: 'Resolve target resource names from latest infra deployment'
                inputs:
                  azureSubscription: $(azureSubscription)
                  scriptType: bash
                  scriptLocation: inlineScript
                  inlineScript: |
                    set -e
                    LATEST=$(az deployment sub list \
                      --query "sort_by([?starts_with(name, 'ara-${{ parameters.targetEnv }}-')], &properties.timestamp)[-1].name" \
                      -o tsv)
                    if [ -z "$LATEST" ]; then
                      echo "ERROR: no sub-scope deployment named 'ara-${{ parameters.targetEnv }}-*' found. Run the infra pipeline first."
                      exit 1
                    fi
                    echo "Latest infra deployment: $LATEST"
                    RG=$(az deployment sub show --name "$LATEST" --query "properties.outputs.resourceGroupName.value" -o tsv)
                    NP=$(az deployment sub show --name "$LATEST" --query "properties.outputs.namePrefix.value" -o tsv)
                    API="app-$NP-api"
                    WEB="app-$NP-web"
                    echo "RG=$RG  API=$API  WEB=$WEB"
                    echo "##vso[task.setvariable variable=rgName;isOutput=true]$RG"
                    echo "##vso[task.setvariable variable=apiAppName;isOutput=true]$API"
                    echo "##vso[task.setvariable variable=webAppName;isOutput=true]$WEB"

              - task: AzureCLI@2
                displayName: 'Apply API app-settings (deploy/config/appsettings.api.${{ parameters.targetEnv }}.json)'
                inputs:
                  azureSubscription: $(azureSubscription)
                  scriptType: pscore
                  scriptLocation: inlineScript
                  inlineScript: |
                    & "$(Build.SourcesDirectory)/deploy/scripts/apply-appsettings.ps1" `
                      -ResourceGroup "$(lookup.rgName)" `
                      -AppName       "$(lookup.apiAppName)" `
                      -EnvName       "${{ parameters.targetEnv }}" `
                      -App           "api"

              - task: AzureCLI@2
                displayName: 'Apply Web app-settings (if present)'
                condition: succeeded()
                continueOnError: true
                inputs:
                  azureSubscription: $(azureSubscription)
                  scriptType: pscore
                  scriptLocation: inlineScript
                  inlineScript: |
                    $cfg = "$(Build.SourcesDirectory)/deploy/config/appsettings.web.${{ parameters.targetEnv }}.json"
                    if (Test-Path $cfg) {
                      & "$(Build.SourcesDirectory)/deploy/scripts/apply-appsettings.ps1" `
                        -ResourceGroup "$(lookup.rgName)" `
                        -AppName       "$(lookup.webAppName)" `
                        -EnvName       "${{ parameters.targetEnv }}" `
                        -App           "web"
                    } else {
                      Write-Host "No web app-settings file — skipping."
                    }

              # ---- API zip deploy: prod slot for dev (B1 has no slots), staging slot otherwise
              - task: AzureWebApp@1
                displayName: 'Deploy API zip (production slot — dev)'
                condition: and(succeeded(), eq('${{ parameters.targetEnv }}', 'dev'))
                inputs:
                  azureSubscription: $(azureSubscription)
                  appType: 'webAppLinux'
                  appName: '$(lookup.apiAppName)'
                  resourceGroupName: '$(lookup.rgName)'
                  package: '$(Pipeline.Workspace)/api-package/api.zip'
                  deploymentMethod: 'zipDeploy'

              - task: AzureWebApp@1
                displayName: 'Deploy API zip (staging slot — non-dev)'
                condition: and(succeeded(), ne('${{ parameters.targetEnv }}', 'dev'))
                inputs:
                  azureSubscription: $(azureSubscription)
                  appType: 'webAppLinux'
                  appName: '$(lookup.apiAppName)'
                  resourceGroupName: '$(lookup.rgName)'
                  package: '$(Pipeline.Workspace)/api-package/api.zip'
                  deploymentMethod: 'zipDeploy'
                  deployToSlotOrASE: true
                  slotName: 'staging'

              - task: AzureWebApp@1
                displayName: 'Deploy Web zip -> $(lookup.webAppName)'
                inputs:
                  azureSubscription: $(azureSubscription)
                  appType: 'webAppLinux'
                  appName: '$(lookup.webAppName)'
                  resourceGroupName: '$(lookup.rgName)'
                  package: '$(Pipeline.Workspace)/web-package/web.zip'
                  deploymentMethod: 'zipDeploy'

              - task: AzureCLI@2
                displayName: 'Smoke test API'
                inputs:
                  azureSubscription: $(azureSubscription)
                  scriptType: bash
                  scriptLocation: inlineScript
                  inlineScript: |
                    set -e
                    if [ "${{ parameters.targetEnv }}" = "dev" ]; then
                      HOST=$(az webapp show -g "$(lookup.rgName)" -n "$(lookup.apiAppName)" --query defaultHostName -o tsv)
                    else
                      HOST=$(az webapp show -g "$(lookup.rgName)" -n "$(lookup.apiAppName)" --slot staging --query defaultHostName -o tsv)
                    fi
                    for path in /health/live /health/ready; do
                      code=$(curl -sk -o /dev/null -w "%{http_code}" "https://$HOST$path")
                      if [ "$code" != "200" ]; then
                        echo "Smoke test failed: $path => $code"; exit 1
                      fi
                    done
                    echo "Smoke tests passed."

              - task: AzureCLI@2
                displayName: 'Blue/Green slot swap (non-dev)'
                condition: and(succeeded(), ne('${{ parameters.targetEnv }}', 'dev'))
                inputs:
                  azureSubscription: $(azureSubscription)
                  scriptType: bash
                  scriptLocation: inlineScript
                  inlineScript: |
                    az webapp deployment slot swap \
                      --resource-group "$(lookup.rgName)" \
                      --name "$(lookup.apiAppName)" \
                      --slot staging --target-slot production
