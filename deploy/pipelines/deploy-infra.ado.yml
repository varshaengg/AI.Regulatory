# =============================================================================
# ARA — Infrastructure pipeline (Azure DevOps)
# Bicep what-if + subscription-scope deploy. Does NOT touch app code.
# Sibling of deploy-code.ado.yml (code deployment lives there).
#
# Trigger: any change under deploy/bicep/** (or manual run).
# =============================================================================
name: ARA-Infra-$(Date:yyyyMMdd)$(Rev:.rr)

trigger:
  branches:
    include: [ main ]
  paths:
    include:
      - deploy/bicep/**
      - deploy/pipelines/deploy-infra.ado.yml

parameters:
  - name: targetEnv
    displayName: 'Target environment'
    type: string
    default: 'dev'
    values: [ dev, test, uat, prod ]

variables:
  - group: ara-deploy
  - name: bicepDir
    value: '$(Build.SourcesDirectory)/deploy/bicep'
  - name: paramFile
    value: '$(Build.SourcesDirectory)/deploy/bicep/parameters.${{ parameters.targetEnv }}.json'
  - name: deploymentName
    value: 'ara-${{ parameters.targetEnv }}-$(Build.BuildId)'

stages:
# ---------------------------------------------------------------------------
# 1. Bicep what-if preview (no deploy)
# ---------------------------------------------------------------------------
- stage: WhatIf
  jobs:
    - job: WhatIfPreview
      pool: { vmImage: 'ubuntu-latest' }
      steps:
        - checkout: self
        - task: Bash@3
          displayName: 'Build extraAppSettingsMap from deploy/config'
          name: cfg
          inputs:
            targetType: inline
            script: |
              set -e
              MAP='{}'
              CFG_DIR="$(Build.SourcesDirectory)/deploy/config"
              for f in "$CFG_DIR"/appsettings.*.${{ parameters.targetEnv }}.json; do
                [ -f "$f" ] || continue
                FEATURE=$(basename "$f" | sed -E "s/^appsettings\.(.+)\.${{ parameters.targetEnv }}\.json$/\1/")
                echo "Loading $FEATURE settings from $f"
                MAP=$(jq --arg f "$FEATURE" --slurpfile v "$f" '. + {($f): $v[0]}' <<<"$MAP")
              done
              echo "$MAP" > "$(Agent.TempDirectory)/extra.json"
              MINI=$(jq -c . "$(Agent.TempDirectory)/extra.json")
              echo "##vso[task.setvariable variable=extraMap;isOutput=true]$MINI"
        - task: AzureCLI@2
          displayName: 'az deployment sub what-if'
          inputs:
            azureSubscription: $(azureSubscription)
            scriptType: bash
            scriptLocation: inlineScript
            inlineScript: |
              set -e
              az deployment sub what-if \
                --location $(azureRegion) \
                --template-file $(bicepDir)/main.bicep \
                --parameters $(paramFile) \
                --parameters environmentName=${{ parameters.targetEnv }} \
                             project=$(project) \
                             location=$(azureRegion) \
                             publisherAcrLoginServer=$(publisherAcrLoginServer) \
                             imageTag=$(imageTag) \
                             deployerObjectId=$(deployerObjectId) \
                             extraAppSettingsMap='$(cfg.extraMap)'

# ---------------------------------------------------------------------------
# 2. Bicep deploy (subscription scope) — approval gated on ADO Environment.
# ---------------------------------------------------------------------------
- stage: Deploy
  dependsOn: WhatIf
  jobs:
    - deployment: DeployInfra
      environment: 'ara-${{ parameters.targetEnv }}'
      pool: { vmImage: 'ubuntu-latest' }
      strategy:
        runOnce:
          deploy:
            steps:
              - checkout: self
              - task: Bash@3
                displayName: 'Build extraAppSettingsMap from deploy/config'
                name: cfg
                inputs:
                  targetType: inline
                  script: |
                    set -e
                    MAP='{}'
                    CFG_DIR="$(Build.SourcesDirectory)/deploy/config"
                    for f in "$CFG_DIR"/appsettings.*.${{ parameters.targetEnv }}.json; do
                      [ -f "$f" ] || continue
                      FEATURE=$(basename "$f" | sed -E "s/^appsettings\.(.+)\.${{ parameters.targetEnv }}\.json$/\1/")
                      echo "Loading $FEATURE settings from $f"
                      MAP=$(jq --arg f "$FEATURE" --slurpfile v "$f" '. + {($f): $v[0]}' <<<"$MAP")
                    done
                    MINI=$(jq -c . <<<"$MAP")
                    echo "##vso[task.setvariable variable=extraMap;isOutput=true]$MINI"
              - task: AzureCLI@2
                displayName: 'Bicep deploy (subscription scope)'
                inputs:
                  azureSubscription: $(azureSubscription)
                  scriptType: bash
                  scriptLocation: inlineScript
                  inlineScript: |
                    set -e
                    az deployment sub create \
                      --location $(azureRegion) \
                      --name "$(deploymentName)" \
                      --template-file $(bicepDir)/main.bicep \
                      --parameters $(paramFile) \
                      --parameters environmentName=${{ parameters.targetEnv }} \
                                   project=$(project) \
                                   location=$(azureRegion) \
                                   publisherAcrLoginServer=$(publisherAcrLoginServer) \
                                   imageTag=$(imageTag) \
                                   deployerObjectId=$(deployerObjectId) \
                                   extraAppSettingsMap='$(cfg.extraMap)'
                    echo ""
                    echo "Outputs:"
                    az deployment sub show --name "$(deploymentName)" --query "properties.outputs" -o json
